<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>杨利伟｜博客</title>
<style>
body{
  font-family:-apple-system,Arial;
  background:#0b0f1a;
  color:#eee;
  padding:40px;
}
h1{color:#facc15}
a{color:#60a5fa;text-decoration:none}
.post{margin:20px 0;padding:20px;background:#111827;border-radius:10px}
.date{color:#999;font-size:14px}
</style>
</head>

<body>

<h1>杨利伟｜博客</h1>
<p>记录我的经历与观点</p>

<div id="posts"></div>

<script>
const posts = [
  {
    title:"我的第一篇文章",
    date:"2026-05-17",
    file:"post1.html"
  }
];

const container = document.getElementById("posts");

posts.forEach(p=>{
  container.innerHTML += `
    <div class="post">
      <h2><a href="${p.file}">${p.title}</a></h2>
      <div class="date">${p.date}</div>
    </div>
  `;
});
</script>

</body>
</html>
